name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. managesievej-v0.4.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  publish:
    name: Build and Publish to Maven Central + GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            },{
              "id": "central",
              "username": "${{ secrets.CENTRAL_TOKEN_USER }}",
              "password": "${{ secrets.CENTRAL_TOKEN_PASS }}"
            }]

      - name: Build and package
        run: mvn -B clean package -DskipTests

      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          printf '%s\n' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          mkdir -p ~/.gnupg
          printf '%s\n' "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent 2>/dev/null || true

      - name: Publish to Maven Central
        run: mvn -B deploy -DskipTests -P central -Dgpg.keyname=CBDA2BCD7A159E9C
        env:
          GPG_TTY: $(tty)
          MAVEN_OPTS: -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'target/*.jar'

      - name: Set release tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG_NAME=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=${{ inputs.release_tag }}" >> $GITHUB_ENV
          fi

      - name: Upload JAR to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for jar in target/*.jar; do
            [ -f "$jar" ] || continue
            gh release upload "${TAG_NAME}" \
              "$jar" \
              --clobber
          done

      - name: Generate checksums
        run: |
          cd target
          for jar in *.jar; do
            [ -f "$jar" ] || continue
            sha256sum "$jar" >> checksums.txt
          done

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG_NAME}" \
            target/checksums.txt \
            --clobber

      - name: Update release notes with usage instructions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#managesievej-}"
          cat << 'EOF' > usage.md

          ## Installation

          ### Option 1: Maven Central (Recommended - No Extra Repository Required)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${VERSION}</version>
          </dependency>
          ```

          No extra repository configuration needed — Maven Central is included by default.

          ### Option 2: JitPack (Deprecated - No Authentication Required)

          ```xml
          <repositories>
              <repository>
                  <id>jitpack.io</id>
                  <url>https://jitpack.io</url>
              </repository>
          </repositories>

          <dependencies>
              <dependency>
                  <groupId>com.github.lenucksi</groupId>
                  <artifactId>ManageSieveJ</artifactId>
                  <version>${TAG_NAME}</version>
              </dependency>
          </dependencies>
          ```

          **Note:** JitPack is deprecated. Please migrate to Maven Central (Option 1).

          ### Option 3: GitHub Packages (Requires Authentication)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${VERSION}</version>
          </dependency>

          <repositories>
              <repository>
                  <id>github</id>
                  <url>https://maven.pkg.github.com/lenucksi/ManageSieveJ</url>
              </repository>
          </repositories>
          ```

          Requires `~/.m2/settings.xml` with GitHub token.

          ## Verification

          Verify the checksums:

          ```bash
          sha256sum -c checksums.txt
          ```

          Verify SLSA provenance:

          ```bash
          gh attestation verify managesievej-${VERSION}.jar \
            --owner lenucksi
          ```
          EOF

          gh release edit "${TAG_NAME}" \
            --notes-file <(cat <(gh release view "${TAG_NAME}" --json body -q .body) usage.md)

      - name: Trigger JitPack build
        run: |
          echo "Triggering JitPack build for release ${TAG_NAME}..."
          curl -s -m 30 "https://jitpack.io/com/github/lenucksi/ManageSieveJ/${TAG_NAME}/build.log" || true
          echo "JitPack build triggered. Check status at: https://jitpack.io/com/github/lenucksi/ManageSieveJ/${TAG_NAME}"
