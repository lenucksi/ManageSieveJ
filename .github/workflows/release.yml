name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  attestations: write
  packages: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Create Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-and-publish:
    name: Build and Publish to Maven Central + GitHub Packages
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            },{
              "id": "central",
              "username": "${{ secrets.CENTRAL_TOKEN_USER }}",
              "password": "${{ secrets.CENTRAL_TOKEN_PASS }}"
            }]

      - name: Build and package
        run: mvn -B clean package -DskipTests

      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@cb9bde2e2525e640591a934b1a28d3e2b4a6e1c3 # v6.4.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: "CBDA2BCD7A159E9C"

      - name: Publish to Maven Central
        run: mvn -B deploy -DskipTests -P central -Dgpg.keyname=managesievej@lenucksi.github.io
        env:
          GPG_TTY: $(tty)
          MAVEN_OPTS: -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'target/*.jar'

      - name: Upload JAR to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for jar in target/*.jar; do
            [ -f "$jar" ] || continue
            filename=$(basename "$jar")
            gh release upload ${{ needs.release-please.outputs.tag_name }} \
              "$jar" \
              --clobber
          done

      - name: Generate checksums
        run: |
          cd target
          for jar in *.jar; do
            [ -f "$jar" ] || continue
            sha256sum "$jar" >> checksums.txt
          done

      - name: Upload checksums to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            target/checksums.txt \
            --clobber

      - name: Update release notes with usage instructions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > usage.md

          ## Installation

          ### Option 1: Maven Central (Recommended - No Extra Repository Required)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${{ needs.release-please.outputs.version }}</version>
          </dependency>
          ```

          No extra repository configuration needed — Maven Central is included by default.

          ### Option 2: JitPack (Deprecated - No Authentication Required)

          ```xml
          <repositories>
              <repository>
                  <id>jitpack.io</id>
                  <url>https://jitpack.io</url>
              </repository>
          </repositories>

          <dependencies>
              <dependency>
                  <groupId>com.github.lenucksi</groupId>
                  <artifactId>ManageSieveJ</artifactId>
                  <version>${{ needs.release-please.outputs.tag_name }}</version>
              </dependency>
          </dependencies>
          ```

          **Note:** JitPack is deprecated. Please migrate to Maven Central (Option 1).

          ### Option 3: GitHub Packages (Requires Authentication)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${{ needs.release-please.outputs.version }}</version>
          </dependency>

          <repositories>
              <repository>
                  <id>github</id>
                  <url>https://maven.pkg.github.com/lenucksi/ManageSieveJ</url>
              </repository>
          </repositories>
          ```

          Requires `~/.m2/settings.xml` with GitHub token.

          ## Verification

          Verify the checksums:

          ```bash
          sha256sum -c checksums.txt
          ```

          Verify SLSA provenance:

          ```bash
          gh attestation verify managesievej-${{ needs.release-please.outputs.version }}.jar \
            --owner lenucksi
          ```
          EOF

          gh release edit ${{ needs.release-please.outputs.tag_name }} \
            --notes-file <(cat <(gh release view ${{ needs.release-please.outputs.tag_name }} --json body -q .body) usage.md)

      - name: Trigger JitPack build
        run: |
          echo "Triggering JitPack build for release ${{ needs.release-please.outputs.tag_name }}..."
          # Trigger build by requesting the artifact (30 second timeout to avoid waiting for full build)
          curl -s -m 30 "https://jitpack.io/com/github/lenucksi/ManageSieveJ/${{ needs.release-please.outputs.tag_name }}/build.log" || true
          echo "JitPack build triggered. Check status at: https://jitpack.io/com/github/lenucksi/ManageSieveJ/${{ needs.release-please.outputs.tag_name }}"
