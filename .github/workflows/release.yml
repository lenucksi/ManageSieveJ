name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  publish:
    name: Build and Publish to Maven Central + GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 21 + Maven settings + GPG
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_TOKEN_USER
          server-password: CENTRAL_TOKEN_PASS
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build and package
        run: mvn -B clean package -DskipTests

      - name: Publish to GitHub Packages
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Central
        run: mvn -B deploy -DskipTests -P central -Dgpg.keyname=EB8AEC2BA4B6DC1F -X
        env:
          CENTRAL_TOKEN_USER: ${{ secrets.CENTRAL_TOKEN_USER }}
          CENTRAL_TOKEN_PASS: ${{ secrets.CENTRAL_TOKEN_PASS }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'target/*.jar'

      - name: Upload JAR to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          for jar in target/*.jar; do
            [ -f "$jar" ] || continue
            gh release upload "${TAG_NAME}" \
              "$jar" \
              --clobber
          done

      - name: Generate checksums
        run: |
          cd target
          for jar in *.jar; do
            [ -f "$jar" ] || continue
            sha256sum "$jar" >> checksums.txt
          done

      - name: Upload checksums to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${TAG_NAME}" \
            target/checksums.txt \
            --clobber

      - name: Update release notes with usage instructions
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#managesievej-}"
          cat << 'EOF' > usage.md

          ## Installation

          ### Option 1: Maven Central (Recommended - No Extra Repository Required)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${VERSION}</version>
          </dependency>
          ```

          No extra repository configuration needed — Maven Central is included by default.

          ### Option 2: JitPack (Deprecated - No Authentication Required)

          ```xml
          <repositories>
              <repository>
                  <id>jitpack.io</id>
                  <url>https://jitpack.io</url>
              </repository>
          </repositories>

          <dependencies>
              <dependency>
                  <groupId>com.github.lenucksi</groupId>
                  <artifactId>ManageSieveJ</artifactId>
                  <version>${TAG_NAME}</version>
              </dependency>
          </dependencies>
          ```

          **Note:** JitPack is deprecated. Please migrate to Maven Central (Option 1).

          ### Option 3: GitHub Packages (Requires Authentication)

          ```xml
          <dependency>
              <groupId>io.github.lenucksi</groupId>
              <artifactId>managesievej</artifactId>
              <version>${VERSION}</version>
          </dependency>

          <repositories>
              <repository>
                  <id>github</id>
                  <url>https://maven.pkg.github.com/lenucksi/ManageSieveJ</url>
              </repository>
          </repositories>
          ```

          Requires `~/.m2/settings.xml` with GitHub token.

          ## Verification

          Verify the checksums:

          ```bash
          sha256sum -c checksums.txt
          ```

          Verify SLSA provenance:

          ```bash
          gh attestation verify managesievej-${VERSION}.jar \
            --owner lenucksi
          ```
          EOF

          gh release edit "${TAG_NAME}" \
            --notes-file <(cat <(gh release view "${TAG_NAME}" --json body -q .body) usage.md)

      - name: Trigger JitPack build
        if: github.event_name == 'release'
        run: |
          echo "Triggering JitPack build for release ${TAG_NAME}..."
          curl -s -m 30 "https://jitpack.io/com/github/lenucksi/ManageSieveJ/${TAG_NAME}/build.log" || true
          echo "JitPack build triggered. Check status at: https://jitpack.io/com/github/lenucksi/ManageSieveJ/${TAG_NAME}"
